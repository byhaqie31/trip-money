  <path d="M33 28.6 37.4 32 33 35.4z" fill="#17250e"/>
  <!-- perforation notches -->
  <circle cx="42" cy="20" r="3.4" fill="#1b2420"/>
  <circle cx="42" cy="44" r="3.4" fill="#1b2420"/>
  <!-- stub barcode -->
